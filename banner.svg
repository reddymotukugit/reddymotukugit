<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="55%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.45"/>
    </linearGradient>
  </defs>

  <!-- Full background -->
  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="840" cy="48"  r="75"  fill="#6366f1" opacity="0.12"/>
  <circle cx="808" cy="178" r="48"  fill="#06b6d4"  opacity="0.10"/>
  <circle cx="68"  cy="172" r="58"  fill="#818cf8"  opacity="0.10"/>
  <circle cx="42"  cy="38"  r="36"  fill="#22d3ee"  opacity="0.08"/>
  <circle cx="450" cy="18"  r="85"  fill="#4f46e5"  opacity="0.06"/>

  <!-- Bottom wave layers -->
  <path d="M0,152 C120,132 260,168 420,150 C580,132 720,165 900,150 L900,220 L0,220 Z" fill="url(#wave1)"/>
  <path d="M0,170 C160,155 370,182 580,165 C730,152 840,175 900,168 L900,220 L0,220 Z" fill="url(#wave2)"/>

  <!-- Name -->
  <text x="450" y="86" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">Reddy Motuku</text>

  <!-- Role -->
  <text x="450" y="126" font-family="'Segoe UI',Arial,sans-serif" font-size="21" font-weight="400" fill="#c7d2fe" text-anchor="middle" letter-spacing="0.5">Azure Data &amp; AI Engineer</text>

  <!-- Info pill -->
  <rect x="272" y="146" width="356" height="32" rx="16" fill="url(#pill)"/>
  <text x="450" y="167" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">📍 Australia  ·  5 Years Experience  ·  Open to Work</text>
</svg>
