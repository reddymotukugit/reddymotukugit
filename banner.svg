<svg width="900" height="210" viewBox="0 0 900 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="210" fill="url(#bg)"/>

  <!-- Decorative glowing circles -->
  <circle cx="830" cy="45"  r="70"  fill="#6366f1" opacity="0.12"/>
  <circle cx="800" cy="170" r="45"  fill="#06b6d4"  opacity="0.10"/>
  <circle cx="70"  cy="170" r="55"  fill="#818cf8"  opacity="0.10"/>
  <circle cx="40"  cy="35"  r="35"  fill="#22d3ee"  opacity="0.08"/>
  <circle cx="450" cy="20"  r="80"  fill="#4f46e5"  opacity="0.06"/>

  <!-- Wave bottom layers -->
  <path d="M0,145 C120,125 250,165 400,145 C550,125 700,160 900,145 L900,210 L0,210 Z" fill="url(#wave1)"/>
  <path d="M0,165 C150,148 350,178 550,162 C700,148 820,172 900,162 L900,210 L0,210 Z" fill="url(#wave2)"/>

  <!-- Main Name -->
  <text x="450" y="82" font-family="'Segoe UI',Arial,sans-serif" font-size="50" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">Reddy Motuku</text>

  <!-- Role -->
  <text x="450" y="122" font-family="'Segoe UI',Arial,sans-serif" font-size="21" font-weight="400" fill="#c7d2fe" text-anchor="middle" letter-spacing="0.5">Azure Data &amp; AI Engineer</text>

  <!-- Bottom info pill -->
  <rect x="258" y="140" width="384" height="34" rx="17" fill="url(#pill)"/>
  <text x="450" y="162" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">📍 Sydney, Australia  ·  5+ Years Experience  ·  Open to Opportunities</text>
</svg>
